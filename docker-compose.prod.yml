services:
  ai-ops:
    container_name: ai-ops-app
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - ai_ops_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  ai_ops_data:
